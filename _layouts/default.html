<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }} | Dienay Lima</title>
    {% seo %}
    <!-- favicon -->
    <link rel="shortcut icon" href="{{ '/img/D-Logo.svg' | relative_url }}" />

    <!-- global styles -->
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ '/assets/css/global.css' | relative_url }}"
    />
    <!-- styles -->
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ '/assets/css/header.css' | relative_url }}"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ '/assets/css/home.css' | relative_url }}"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ '/assets/css/about.css' | relative_url }}"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ '/assets/css/projects.css' | relative_url }}"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ '/assets/css/contact.css' | relative_url }}"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ '/assets/css/footer.css' | relative_url }}"
    />

    {% if page.layout == 'post' %}
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ '/assets/css/post.css' | relative_url }}"
    />
    {% endif %} {% if page.layout == 'post' or page.url == '/artigos/' %}
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ '/assets/css/blog.css' | relative_url }}"
    />
    {% endif %} {% if page.url contains 'politica' %}
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ '/assets/css/privacy.css' | relative_url }}"
    />
    {% endif %}
  </head>
  <body>
    {% include header.html %} {{ content }} {% include footer.html %}
    <script>
      window.BASE_URL = "{{ site.baseurl }}";
    </script>
    <script src="{{ '/js/menu.js' | relative_url }}"></script>
    <script src="{{ '/js/navigation.js' | relative_url }}"></script>
    <script src="{{ '/js/modal.js' | relative_url }}"></script>
  </body>
</html>
